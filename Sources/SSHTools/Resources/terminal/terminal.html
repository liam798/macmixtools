<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="stylesheet" href="xterm.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }
      #terminal {
        width: 100%;
        height: 100%;
        user-select: none;
      }
      #fallback {
        position: absolute;
        inset: 0;
        padding: 12px;
        color: #9ef;
        font-family: ui-monospace, Menlo, Monaco, monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }
      .xterm .xterm-viewport {
        overflow-y: auto;
      }
      #terminal.allow-select,
      #terminal.allow-select * {
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <div id="fallback"></div>

    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script>
      (function () {
        const encoder = new TextEncoder();
        const fallbackEl = document.getElementById("fallback");

        function bytesToBase64(bytes) {
          let binary = "";
          for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
          }
          return btoa(binary);
        }

        function base64ToBytes(b64) {
          const binary = atob(b64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          return bytes;
        }

        function postMessage(payload) {
          try {
            window.webkit.messageHandlers.sshTerm.postMessage(payload);
          } catch (_) {}
        }

        window.onerror = function (message, source, lineno, colno, error) {
          const text =
            String(message) +
            "\n" +
            String(source || "") +
            ":" +
            String(lineno || 0) +
            ":" +
            String(colno || 0) +
            (error && error.stack ? "\n" + String(error.stack) : "");
          if (fallbackEl) fallbackEl.textContent = text;
          postMessage({ type: "jsError", message: text });
          return false;
        };

        if (!window.Terminal) {
          const msg = "xterm.js failed to load (window.Terminal is missing).";
          if (fallbackEl) fallbackEl.textContent = msg;
          postMessage({ type: "jsError", message: msg });
          return;
        }

        const term = new Terminal({
          cursorBlink: true,
          scrollback: 5000,
          fontFamily:
            "Menlo, Monaco, SFMono-Regular, ui-monospace, monospace",
          fontSize: 13,
          allowProposedApi: true,
          convertEol: true,
          lineHeight: 1.1,
          rendererType: "dom",
          theme: { background: "#000000", foreground: "#ffffff" },
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        if (term.unicode && term.unicode.versions && term.unicode.versions.length) {
          const latestUnicode = term.unicode.versions[term.unicode.versions.length - 1];
          try {
            if (term.unicode.activeVersion !== latestUnicode) {
              term.unicode.activeVersion = latestUnicode;
            }
          } catch (_) {}
        }

        term.attachCustomKeyEventHandler((ev) => {
          if (ev.type !== "keydown") return true;

          const key = (ev.key || "").toLowerCase();
          if (ev.metaKey && key === "c") {
            const sel = term.getSelection();
            if (sel && sel.length > 0) {
              postMessage({ type: "copy", text: sel });
              return false;
            }
            return true;
          }

          return true;
        });

        term.onData((data) => {
          const bytes = encoder.encode(data);
          postMessage({ type: "input", b64: bytesToBase64(bytes) });
        });

        term.onResize((size) => {
          postMessage({ type: "resize", cols: size.cols, rows: size.rows });
          try {
            term.refresh(0, Math.max(0, size.rows - 1));
          } catch (_) {}
        });

        if (term.parser && typeof term.parser.registerOscHandler === "function") {
          term.parser.registerOscHandler(7, (data) => {
            postMessage({ type: "cwd", data: String(data || "") });
            return true;
          });
        }

        const writeQueue = [];
        let writeInProgress = false;

        function processWriteQueue() {
          if (writeInProgress) return;
          if (writeQueue.length === 0) return;

          const items = writeQueue.splice(0, writeQueue.length);
          let total = 0;
          for (let i = 0; i < items.length; i++) {
            try {
              total += atob(items[i]).length;
            } catch (_) {}
          }
          if (total <= 0) return;

          const merged = new Uint8Array(total);
          let offset = 0;
          for (let i = 0; i < items.length; i++) {
            try {
              const bytes = base64ToBytes(items[i]);
              merged.set(bytes, offset);
              offset += bytes.length;
            } catch (_) {}
          }

          writeInProgress = true;
          try {
            term.write(merged, () => {
              writeInProgress = false;
              processWriteQueue();
            });
          } catch (_) {
            writeInProgress = false;
            processWriteQueue();
          }
        }

        window.sshToolsWriteBatchBase64 = function (items) {
          if (!Array.isArray(items) || items.length === 0) return;
          for (let i = 0; i < items.length; i++) {
            if (typeof items[i] === "string") {
              writeQueue.push(items[i]);
            }
          }
          processWriteQueue();
        };

        window.sshToolsWriteBase64 = function (b64) {
          window.sshToolsWriteBatchBase64([b64]);
        };

        function hardFocus() {
          try { term.focus(); } catch (_) {}
          try {
            const ta = terminalEl.querySelector("textarea");
            if (ta) ta.focus();
          } catch (_) {}
        }

        window.sshToolsFocus = function () {
          hardFocus();
          try { term.scrollToBottom(); } catch (_) {}
        };

        const terminalEl = document.getElementById("terminal");
        terminalEl.tabIndex = 0;
        terminalEl.addEventListener("focus", () => {
          hardFocus();
        });
        terminalEl.addEventListener("mousedown", () => {
          terminalEl.classList.add("allow-select");
          hardFocus();
        });
        terminalEl.addEventListener("click", () => {
          hardFocus();
        });
        terminalEl.addEventListener("keydown", () => {
          hardFocus();
        });
        window.addEventListener("focus", () => {
          hardFocus();
        });
        window.addEventListener("mouseup", () => {
          terminalEl.classList.remove("allow-select");
        });

        // Keep input handling on xterm's onData.

        term.open(terminalEl);
        if (fallbackEl) fallbackEl.remove();

        const ro = new ResizeObserver(() => {
          fitAddon.fit();
        });
        ro.observe(terminalEl);

        requestAnimationFrame(() => {
          fitAddon.fit();
          try {
            const dims = term._core && term._core._renderService && term._core._renderService.dimensions;
            if (dims && dims.css && dims.css.cell && dims.css.cell.height) {
              term.element.style.lineHeight = `${dims.css.cell.height}px`;
            }
          } catch (_) {}
          term.focus();
          postMessage({ type: "ready" });
        });
      })();
    </script>
  </body>
</html>
